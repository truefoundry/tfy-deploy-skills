architecture: replication
auth:
  enabled: true
  # Use TrueFoundry secrets in production
replica:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
master:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  persistence:
    enabled: true
    size: 10Gi
metrics:
  enabled: true
