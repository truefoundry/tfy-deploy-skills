type: service
name: weather-api
image:
  type: build
  build_source:
    type: local
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context: .
ports:
  - port: 8000
    protocol: TCP
    expose: true
    host: weather-api.ml.tfy-eo.truefoundry.cloud
replicas: 1
resources:
  cpu_limit: 0.5
  cpu_request: 0.2
  memory_limit: 512
  memory_request: 256
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
env:
  DATABASE_URL: "postgresql://weather:changeme@weather-db.sai-ws.svc.cluster.local:5432/weatherdb"
workspace_fqn: "tfy-ea-dev-eo-az:sai-ws"
