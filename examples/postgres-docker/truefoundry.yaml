type: service
name: postgres-example
image:
  type: image
  image_uri: postgres:16-alpine
ports:
  - port: 5432
    protocol: TCP
    expose: false
replicas: 1
resources:
  cpu_limit: 1.0
  cpu_request: 0.5
  memory_limit: 1024
  memory_request: 512
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
  storage: 10Gi
env:
  POSTGRES_DB: "appdb"
  POSTGRES_USER: "appuser"
  POSTGRES_PASSWORD: "changeme"
workspace_fqn: "tfy-ea-dev-eo-az:sai-ws"
